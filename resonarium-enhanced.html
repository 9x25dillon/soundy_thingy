<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Resonarium</title>
<style>
:root {
  --void: #070a16;
  --deep: #0f1530;
  --panel: #141b3a;
  --line: #26305c;
  --sun: #f5b942;
  --water: #3fd6c4;
  --emit: #b06cf0;
  --mist: #8b93b0;
  --text: #e8ecf7;
  --accent: linear-gradient(90deg, #6ee7f9, #8b5cf6);
  --bg-grad: radial-gradient(120% 90% at 50% -10%, #15204a 0%, #0a0f24 45%, #070a16 100%);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--void);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100vh;background:var(--bg-grad);background-attachment:fixed;overflow-x:hidden}
body{padding-bottom:140px}
.wrap{max-width:1080px;margin:0 auto;padding:0 12px}
header{padding:18px 4px 6px;display:flex;align-items:center;gap:12px;justify-content:space-between}
h1{margin:0;font-size:22px;font-weight:600;letter-spacing:3px;text-transform:uppercase;background:var(--accent);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{font-size:10px;color:var(--mist);letter-spacing:1.5px;text-transform:uppercase;font-family:ui-monospace,monospace}
.topbar{display:flex;gap:8px;align-items:center;justify-content:space-between;margin:8px 0 12px;flex-wrap:wrap}
.transport{display:flex;gap:6px;align-items:center;background:#0c122a;border:1px solid var(--line);border-radius:999px;padding:4px 8px 4px 4px}
button,input,select{font:inherit}
.btn{border:1px solid var(--line);background:#121937;color:var(--mist);border-radius:8px;padding:7px 11px;font-size:11px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:.1s}
.btn:hover{filter:brightness(1.15)}
.btn.primary{border-color:var(--water);color:var(--water)}
.btn.danger{border-color:#f87171;color:#f87171}
.btn:active{transform:translateY(1px)}
.main{display:grid;grid-template-columns:320px 1fr 300px;gap:12px;align-items:start}
@media (max-width:1100px){.main{grid-template-columns:1fr}}
.canvasbox{position:relative;aspect-ratio:1/1;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#05070f;box-shadow:0 20px 70px rgba(0,0,0,.3)}
canvas{width:100%;height:100%;display:block}
#viz{width:100%;height:100%}
.panels{display:flex;flex-direction:column;gap:12px}
.panel{background:linear-gradient(180deg,#141b3a,#0f1530);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.panel.head{display:flex;gap:8px;align-items:center;padding:11px 14px;border-bottom:1px solid rgba(38,48,92,.5);font-size:12px;letter-spacing:1px;text-transform:uppercase}
.panel .body{padding:12px 14px}
.layer-card{border-bottom:1px solid rgba(38,48,92,.4);padding:10px 0}
.layer-card:last-child{border-bottom:none}
.layer-head{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.layer-head .name{flex:1;font-size:13px;font-weight:500}
.knobs{display:grid;grid-template-columns:repeat(auto-fit,minmax(52px,1fr));gap:8px}
.knob{position:relative;width:52px;height:52px;border-radius:50%;background:#0a0f24;border:1px solid var(--line);cursor:ns-resize;touch-action:none}
.knob .ind{position:absolute;left:50%;top:4px;width:2px;height:20px;background:var(--emit);transform-origin:50% 22px}
.knob .val{position:absolute;inset:0;display:grid;place-items:center;font-size:9px;font-family:ui-monospace,monospace;color:var(--mist)}
.slider-row{display:flex;gap:8px;align-items:center;margin:6px 0}
.slider-row label{width:52px;font-size:10px;color:var(--mist);text-transform:uppercase}
input[type=range]{flex:1;height:3px;background:#1f2748;border-radius:3px;accent-color:var(--water)}
.seg{display:flex;gap:2px;flex-wrap:wrap}
.seg button{flex:1;font-size:9px;padding:4px 6px;border:1px solid var(--line);background:#0c122a;color:var(--mist);border-radius:5px}
.seg button.sel{border-color:var(--water);color:var(--water)}
.seq-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;margin-top:8px}
.step{width:100%;aspect-ratio:1/1;border:1px solid var(--line);border-radius:4px;background:#0a0f24;font-size:9px;display:grid;place-items:center;cursor:pointer;font-family:ui-monospace,monospace}
.step.on{background:rgba(63,214,196,.15);border-color:var(--water);color:var(--water)}
.step.playhead{box-shadow:0 0 0 2px var(--sun)}
.preset-list{display:flex;flex-direction:column;gap:4px;max-height:180px;overflow:auto}
.preset{display:flex;gap:6px;align-items:center;padding:6px 8px;background:#0c122a;border:1px solid var(--line);border-radius:6px;font-size:11px;cursor:pointer}
.preset:hover{border-color:var(--water)}
.preset .name{flex:1}
.viz-modes{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.viz-modes button{font-size:9.5px;padding:4px 9px}
.toasts{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;gap:6px;align-items:center}
.toast{background:#1f2748;border:1px solid var(--line);padding:8px 14px;border-radius:999px;font-size:12px;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.overlay{position:fixed;inset:0;background:rgba(3,4,10,.92);display:grid;place-items:center;z-index:200}
.overlay .card{background:#141b3a;border:1px solid var(--line);padding:32px 40px;border-radius:16px;text-align:center;max-width:340px}
.hidden{display:none!important}
.readout{font-family:ui-monospace,monospace;font-size:11px;color:var(--mist)}
h2{font-size:12px;letter-spacing:1.2px;text-transform:uppercase;margin:0 0 8px}
.meter{height:4px;background:#1f2748;border-radius:2px;overflow:hidden;margin-top:4px}
.meter .fill{height:100%;background:linear-gradient(90deg,var(--water),var(--emit));transition:width .05s}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>RESONARIUM</h1>
      <div class="sub">sound resonance laboratory • generative • binaural • cymatics</div>
    </div>
    <div id="master-status" class="readout">READY</div>
  </header>

  <div class="topbar">
    <div class="transport">
      <button id="btn-play" class="btn primary">▶ PLAY</button>
      <button id="btn-stop" class="btn">■ STOP</button>
      <button id="btn-panic" class="btn danger">PANIC</button>
      <div style="width:1px;height:20px;background:var(--line);margin:0 6px"></div>
      <div style="display:flex;align-items:center;gap:4px">
        <input id="master-vol" type="range" min="0" max="1" step="0.01" value="0.7" style="width:90px">
        <span id="master-vol-val" class="readout">70%</span>
      </div>
      <button id="btn-mute" class="btn">MUTE</button>
    </div>

    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <div class="seg">
        <button data-tune="432" class="btn sel">432</button>
        <button data-tune="440" class="btn">440</button>
      </div>
      <div>
        <label style="font-size:9px;color:var(--mist)">BPM</label>
        <input id="tempo" type="range" min="20" max="180" step="1" value="60" style="width:110px">
        <span id="tempo-val" class="readout">60</span>
      </div>
      <button id="btn-tap" class="btn">TAP</button>
    </div>
  </div>

  <div class="main">
    <!-- LEFT: LAYERS + SOLFEGGIO -->
    <div class="panels">
      <div class="panel">
        <div class="head"><span>LAYERS</span><button id="btn-add-layer" class="btn" style="margin-left:auto;font-size:10px;padding:3px 8px">+ ADD</button></div>
        <div class="body" id="layers-container"></div>
      </div>

      <div class="panel">
        <div class="head">SOLFEGGIO LOCK</div>
        <div class="body" id="solfeggio-pad" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px"></div>
      </div>

      <div class="panel">
        <div class="head">BRAINWAVE BEATS</div>
        <div class="body" id="brainwave-pad" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px"></div>
      </div>
    </div>

    <!-- CENTER: VISUALIZER -->
    <div>
      <div class="canvasbox">
        <canvas id="viz" width="640" height="640"></canvas>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
        <div class="viz-modes" id="viz-modes"></div>
        <div>
          <button id="btn-fullscreen" class="btn">FULLSCREEN</button>
          <button id="btn-render-wav" class="btn">RENDER WAV</button>
        </div>
      </div>
      <div id="freq-readout" class="readout" style="margin-top:4px;text-align:center;font-size:13px"></div>
    </div>

    <!-- RIGHT: EFFECTS + SEQ + TIMER + PRESETS -->
    <div class="panels">
      <div class="panel">
        <div class="head">REVERB &amp; DELAY</div>
        <div class="body" id="fx-panel"></div>
      </div>

      <div class="panel">
        <div class="head">SEQUENCER <button id="btn-seq-enable" class="btn" style="margin-left:auto;font-size:10px">ENABLE</button></div>
        <div class="body" id="sequencer-panel"></div>
      </div>

      <div class="panel">
        <div class="head">SESSION TIMER</div>
        <div class="body" id="timer-panel"></div>
      </div>

      <div class="panel">
        <div class="head">PRESETS <button id="btn-save-preset" class="btn" style="margin-left:auto;font-size:10px">SAVE</button></div>
        <div class="body">
          <div id="preset-list" class="preset-list"></div>
          <div style="margin-top:8px;display:flex;gap:6px">
            <button id="btn-export-json" class="btn" style="flex:1;font-size:10px">EXPORT</button>
            <button id="btn-import-json" class="btn" style="flex:1;font-size:10px">IMPORT</button>
            <input type="file" id="file-import" accept=".json" style="display:none">
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<div id="first-run" class="overlay">
  <div class="card">
    <h1 style="margin-bottom:8px">RESONARIUM</h1>
    <p style="color:var(--mist);margin:0 0 20px">A chamber of resonance.<br>Headphones recommended for binaural work.</p>
    <button id="btn-enter" class="btn primary" style="padding:14px 42px;font-size:15px">ENTER THE CHAMBER</button>
  </div>
</div>

<script>
// ==== MODULE: CONFIG ====
const CONFIG = {
  sampleRate: 44100,
  maxVoices: 12,
  analyserFFT: 2048,
  limiterCeilingDb: -1.0,
  solfeggio: [174, 285, 396, 417, 528, 639, 741, 852, 963],
  palettes: {
    aurora: ['#0A2540', '#2DD4BF', '#8B5CF6', '#F0ABFC'],
    ember: ['#1A0A05', '#F97316', '#FBBF24', '#FEF3C7'],
    abyss: ['#02040A', '#1E3A8A', '#22D3EE', '#E0F2FE'],
    solar: ['#1E1400', '#F59E0B', '#FDE68A', '#FFFFFF'],
    mono: ['#0A0A0A', '#6B7280', '#E5E7EB', '#FFFFFF']
  },
  tuningTables: {
    '12TET': (midi) => Math.pow(2, (midi - 69) / 12),
    'just': (midi, rootMidi) => { /* simplified */ return Math.pow(2, (midi - rootMidi) / 12); },
    'pythagorean': (midi) => Math.pow(2, (midi - 69) / 12) * (1 + 0.01 * ((midi % 12) === 7 ? 1 : 0))
  }
};

// ==== MODULE: Util ====
const Util = {
  clamp: (v, min, max) => Math.max(min, Math.min(max, v)),
  lerp: (a, b, t) => a + (b - a) * t,
  dbToGain: (db) => Math.pow(10, db / 20),
  gainToDb: (g) => 20 * Math.log10(Math.max(1e-6, g)),
  midiToFreq: (m, a4 = 432) => a4 * Math.pow(2, (m - 69) / 12),
  freqToMidi: (f, a4 = 432) => 69 + 12 * Math.log2(f / a4),
  noteNameToMidi: (name) => {
    const notes = {C:0,D:2,E:4,F:5,G:7,A:9,B:11};
    const m = name.match(/^([A-Ga-g])([b#]?)(-?\d+)$/);
    if (!m) return 57;
    let n = notes[m[1].toUpperCase()];
    if (m[2] === '#') n++; if (m[2] === 'b') n--;
    return n + (parseInt(m[3]) + 1) * 12;
  },
  noteNameToFreq: (name, a4 = 432) => Util.midiToFreq(Util.noteNameToMidi(name), a4),
  formatHz: (f) => f.toFixed(f < 100 ? 2 : 1),
  formatTime: (s) => {
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2,'0')}`;
  },
  uuid: () => (crypto.randomUUID ? crypto.randomUUID() : 'id' + Date.now() + Math.random()),
  downloadBlob: (blob, name) => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  },
  // WAV encoder (16-bit PCM stereo)
  wavEncode: (buffer) => {
    const numChan = 2, sampleRate = buffer.sampleRate, length = buffer.length;
    const bytesPerSample = 2;
    const blockAlign = numChan * bytesPerSample;
    const dataSize = length * blockAlign;
    const view = new DataView(new ArrayBuffer(44 + dataSize));
    let offset = 0;
    const writeStr = (s) => { for (let i=0;i<s.length;i++) view.setUint8(offset++, s.charCodeAt(i)); };
    writeStr('RIFF'); view.setUint32(offset, 36 + dataSize, true); offset += 4;
    writeStr('WAVEfmt '); view.setUint32(offset, 16, true); offset += 4;
    view.setUint16(offset, 1, true); offset += 2; view.setUint16(offset, numChan, true); offset += 2;
    view.setUint32(offset, sampleRate, true); offset += 4;
    view.setUint32(offset, sampleRate * blockAlign, true); offset += 4;
    view.setUint16(offset, blockAlign, true); offset += 2; view.setUint16(offset, 16, true); offset += 2;
    writeStr('data'); view.setUint32(offset, dataSize, true); offset += 4;
    const ch0 = buffer.getChannelData(0), ch1 = buffer.getChannelData(1) || ch0;
    for (let i = 0; i < length; i++) {
      const s0 = Math.max(-1, Math.min(1, ch0[i]));
      view.setInt16(offset, s0 * 0x7fff, true); offset += 2;
      const s1 = Math.max(-1, Math.min(1, ch1[i]));
      view.setInt16(offset, s1 * 0x7fff, true); offset += 2;
    }
    return new Blob([view], {type: 'audio/wav'});
  },
  toast: (msg, ms = 2600) => {
    const c = document.getElementById('toasts');
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), ms);
  }
};

// ==== MODULE: State ====
let State = {
  current: null,
  save: () => {
    try { localStorage.setItem('resonarium.v2', JSON.stringify(State.current)); } catch(e){}
  },
  load: () => {
    try {
      const raw = localStorage.getItem('resonarium.v2');
      if (raw) return JSON.parse(raw);
    } catch(e){}
    return null;
  },
  defaults: () => ({
    schemaVersion: 2,
    name: "Untitled Resonance",
    masterVolume: 0.7,
    masterMuted: false,
    tuning: { system: "12TET", referenceA: 432 },
    tempoBpm: 60,
    swing: 0,
    reverb: { mix: 0.35, size: 0.6, decay: 4.0, preDelay: 20 },
    delay: { mix: 0.15, timeSync: true, timeMs: 375, syncDivision: "1/8.", feedback: 0.4, pingPong: true, filterHz: 4000 },
    limiterCeilingDb: -1.0,
    layers: [],
    sequencer: { enabled: false, steps: 16, activeLayerId: null, pattern: [], euclid: {enabled:false, pulses:6, rotate:0}, scale: "pentatonicMinor", rootNote: "A2", direction: "forward" },
    visual: { mode: "cymatics", palette: "aurora", intensity: 0.7, motion: 0.6, showGrid: false, reactBass: true, reactMid: true, reactTreble: true },
    timer: { enabled: false, durationMin: 15, fadeInSec: 10, fadeOutSec: 20, endChime: true },
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString()
  })
};

// ==== MODULE: AudioEngine ====
let audioCtx = null, masterGain = null, limiter = null, compressor = null, analyser = null;
let reverbNode = null, reverbWet = null, delayL = null, delayR = null, delayFeedback = null, delayFilter = null, delayWet = null;
let layers = [];
let isPlaying = false;

function createProceduralReverbIR(size = 0.6, decay = 4.0) {
  const length = Math.floor(audioCtx.sampleRate * decay * (0.5 + size * 0.8));
  const buffer = audioCtx.createBuffer(2, length, audioCtx.sampleRate);
  const left = buffer.getChannelData(0);
  const right = buffer.getChannelData(1);
  for (let i = 0; i < length; i++) {
    const t = i / length;
    const env = Math.exp(-t * 3.5 / (decay * 0.8));
    const noise = (Math.random() * 2 - 1) * env * (0.6 + size * 0.7);
    left[i] = noise * (1 - t * 0.2);
    right[i] = noise * (1 - t * 0.2 + (Math.random()-0.5) * 0.15);
  }
  return buffer;
}

async function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Master bus
  compressor = audioCtx.createDynamicsCompressor();
  compressor.threshold.value = -18;
  compressor.ratio.value = 3;
  compressor.knee.value = 6;

  limiter = audioCtx.createWaveShaper();
  limiter.curve = new Float32Array(2048).map((_, i) => {
    const x = (i / 1023 - 1) * 1.1;
    return Math.tanh(x * 1.8); // soft clip
  });

  masterGain = audioCtx.createGain();
  masterGain.value = 0.7;

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = CONFIG.analyserFFT;
  analyser.smoothingTimeConstant = 0.65;

  // Reverb (procedural)
  const reverbBuffer = createProceduralReverbIR(0.6, 4.0);
  reverbNode = audioCtx.createConvolver();
  reverbNode.buffer = reverbBuffer;
  reverbWet = audioCtx.createGain();
  reverbWet.gain.value = 0.35;
  const reverbPre = audioCtx.createDelay(0.2);
  reverbPre.delayTime.value = 0.02;

  // Delay
  delayL = audioCtx.createDelay(2.0);
  delayR = audioCtx.createDelay(2.0);
  delayFeedback = audioCtx.createGain();
  delayFeedback.gain.value = 0.4;
  delayFilter = audioCtx.createBiquadFilter();
  delayFilter.type = 'lowpass';
  delayFilter.frequency.value = 4000;
  delayWet = audioCtx.createGain();
  delayWet.gain.value = 0.15;
  const splitter = audioCtx.createChannelSplitter(2);
  const merger = audioCtx.createChannelMerger(2);

  // Wiring
  compressor.connect(limiter);
  limiter.connect(masterGain);
  masterGain.connect(analyser);
  analyser.connect(audioCtx.destination);

  // Reverb send path
  reverbPre.connect(reverbNode);
  reverbNode.connect(reverbWet);
  reverbWet.connect(masterGain);

  // Delay send path
  delayL.connect(delayFilter);
  delayFilter.connect(delayFeedback);
  delayFeedback.connect(delayL);
  delayL.connect(delayR); // cross
  delayR.connect(delayFeedback);
  delayL.connect(splitter);
  splitter.connect(merger, 0, 0);
  splitter.connect(merger, 1, 1);
  delayWet.connect(masterGain);

  // Create default layer
  if (State.current.layers.length === 0) {
    const l = createDefaultLayer();
    State.current.layers.push(l);
  }
}

function createDefaultLayer() {
  return {
    id: Util.uuid(),
    name: "Drone 1",
    enabled: true, muted: false, soloed: false,
    role: "drone",
    waveform: "sine", unison: 1, unisonDetune: 12, unisonSpread: 0.5,
    rootNote: "A2", octave: 0, fineTuneCents: 0,
    binauralBeatHz: 7.83, binauralEnabled: false,
    chord: ["0"],
    gain: 0.65, pan: 0,
    filter: { type: "lowpass", cutoff: 20000, q: 0.7, keytrack: 0 },
    amplitudeLfo: { enabled: true, rateHz: 0.18, depth: 0.35, shape: "sine", sync: false },
    pitchLfo: { enabled: false, rateHz: 0.6, depthCents: 8, shape: "sine", sync: false },
    filterLfo: { enabled: false, rateHz: 0.3, depthHz: 1200, shape: "sine" },
    envelope: { attack: 2.5, decay: 0.6, sustain: 1.0, release: 5.5 },
    sendReverb: 0.45, sendDelay: 0.12,
    noiseMix: 0, noiseColor: "pink",
    solfeggioLock: null
  };
}

let layerNodes = {}; // id -> {oscillators, gains, ...}

function buildLayerGraph(layer) {
  if (!audioCtx) return;

  // Cleanup previous
  if (layerNodes[layer.id]) {
    const nodes = layerNodes[layer.id];
    (nodes.oscs || []).forEach(o => { try { o.stop(); o.disconnect(); } catch(e){} });
    Object.values(nodes).forEach(n => { if (n && n.disconnect) try { n.disconnect(); } catch(e){} });
  }

  const nodes = {};
  const baseFreq = getLayerBaseFreq(layer);
  const voices = Math.max(1, layer.unison);
  const chordOffsets = layer.chord.length ? layer.chord : ["0"];

  nodes.gain = audioCtx.createGain();
  nodes.gain.gain.value = 0;
  nodes.pan = audioCtx.createStereoPanner();
  nodes.pan.pan.value = layer.pan;

  // Filter
  nodes.filter = audioCtx.createBiquadFilter();
  nodes.filter.type = layer.filter.type;
  nodes.filter.frequency.value = layer.filter.cutoff;
  nodes.filter.Q.value = layer.filter.q;

  // LFOs (simple)
  nodes.ampLFO = createLFO(layer.amplitudeLfo, 'amp');
  nodes.pitchLFO = createLFO(layer.pitchLfo, 'pitch');
  nodes.filterLFO = createLFO(layer.filterLfo, 'filter');

  nodes.oscs = [];
  nodes.voiceGains = [];

  const isBinaural = layer.binauralEnabled || layer.role === 'binaural';

  for (let c = 0; c < chordOffsets.length; c++) {
    const semitone = parseFloat(chordOffsets[c]) || 0;
    for (let u = 0; u < voices; u++) {
      const det = (u - (voices-1)/2) * layer.unisonDetune / 100;
      const f = baseFreq * Math.pow(2, semitone / 12) * Math.pow(2, det / 1200);

      const osc = audioCtx.createOscillator();
      osc.type = layer.waveform === 'supersaw' ? 'sawtooth' : layer.waveform;
      osc.frequency.value = f;

      const vGain = audioCtx.createGain();
      vGain.gain.value = layer.gain / Math.sqrt(voices * chordOffsets.length);

      // Binaural split
      let left = vGain, right = vGain;
      if (isBinaural && c === 0 && u === 0) {
        const pL = audioCtx.createStereoPanner(); pL.pan.value = -1;
        const pR = audioCtx.createStereoPanner(); pR.pan.value = 1;
        const bOsc = audioCtx.createOscillator();
        bOsc.type = 'sine';
        bOsc.frequency.value = f + layer.binauralBeatHz;
        const bGain = audioCtx.createGain(); bGain.gain.value = vGain.gain.value * 0.85;
        bOsc.connect(bGain);
        bGain.connect(pR);
        osc.connect(pL);
        pL.connect(vGain);
        pR.connect(vGain);
        bOsc.start();
        nodes.oscs.push(bOsc);
      } else {
        osc.connect(vGain);
      }

      vGain.connect(nodes.filter);
      nodes.oscs.push(osc);
      nodes.voiceGains.push(vGain);
      osc.start();
    }
  }

  // Noise
  if (layer.noiseMix > 0.001) {
    nodes.noise = createNoiseSource(layer.noiseColor);
    nodes.noiseGain = audioCtx.createGain();
    nodes.noiseGain.gain.value = layer.noiseMix * 0.6;
    nodes.noise.connect(nodes.noiseGain);
    nodes.noiseGain.connect(nodes.filter);
    nodes.noise.start();
  }

  // ADSR / envelope
  const envGain = audioCtx.createGain();
  nodes.envGain = envGain;
  const now = audioCtx.currentTime;
  envGain.gain.value = 0;
  envGain.gain.setValueAtTime(0, now);
  envGain.gain.linearRampToValueAtTime(layer.gain, now + layer.envelope.attack);
  envGain.gain.linearRampToValueAtTime(layer.gain * layer.envelope.sustain, now + layer.envelope.attack + layer.envelope.decay);

  nodes.filter.connect(envGain);
  envGain.connect(nodes.gain);
  nodes.gain.connect(nodes.pan);

  // Sends
  const dry = audioCtx.createGain();
  dry.gain.value = 1 - (layer.sendReverb * 0.6 + layer.sendDelay * 0.3);
  nodes.pan.connect(dry);
  dry.connect(compressor);

  const revSend = audioCtx.createGain(); revSend.gain.value = layer.sendReverb;
  nodes.pan.connect(revSend); revSend.connect(reverbPre);

  const delSend = audioCtx.createGain(); delSend.gain.value = layer.sendDelay;
  nodes.pan.connect(delSend); delSend.connect(delayL);

  nodes.dry = dry;
  layerNodes[layer.id] = nodes;
}

function createLFO(cfg, target) {
  if (!cfg || !cfg.enabled) return null;
  const osc = audioCtx.createOscillator();
  osc.type = cfg.shape === 'square' ? 'square' : cfg.shape === 'triangle' ? 'triangle' : 'sine';
  osc.frequency.value = cfg.rateHz || 0.2;

  const gain = audioCtx.createGain();
  gain.gain.value = (target === 'pitch' ? (cfg.depthCents || 0) / 1200 : (cfg.depth || 0) * 0.5);
  osc.connect(gain);
  osc.start();
  return { osc, gain, cfg };
}

function createNoiseSource(color = 'pink') {
  const bufferSize = 2 * audioCtx.sampleRate;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
  for (let i = 0; i < bufferSize; i++) {
    let white = Math.random() * 2 - 1;
    if (color === 'pink') {
      b0 = 0.99886 * b0 + white * 0.0555179;
      b1 = 0.99332 * b1 + white * 0.0750759;
      b2 = 0.96900 * b2 + white * 0.1538520;
      b3 = 0.86650 * b3 + white * 0.3104856;
      b4 = 0.55000 * b4 + white * 0.5329522;
      b5 = -0.7616 * b5 - white * 0.0168980;
      data[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
      b6 = white * 0.115926;
    } else {
      data[i] = white * (color === 'brown' ? 0.6 : 1);
    }
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  src.loop = true;
  return src;
}

function getLayerBaseFreq(layer) {
  if (layer.solfeggioLock) return layer.solfeggioLock;
  const base = Util.noteNameToFreq(layer.rootNote, State.current.tuning.referenceA);
  const oct = Math.pow(2, layer.octave);
  const fine = Math.pow(2, layer.fineTuneCents / 1200);
  return base * oct * fine;
}

function updateLayerAudio(layer) {
  const nodes = layerNodes[layer.id];
  if (!nodes || !audioCtx) return;

  // Update gains, filter, pan etc (use setTargetAtTime for smoothness)
  const t = audioCtx.currentTime + 0.03;
  if (nodes.gain) nodes.gain.gain.setTargetAtTime(layer.enabled && !layer.muted ? layer.gain : 0, t, 0.03);
  if (nodes.pan) nodes.pan.pan.setTargetAtTime(layer.pan, t, 0.02);
  if (nodes.filter) {
    nodes.filter.frequency.setTargetAtTime(layer.filter.cutoff, t, 0.03);
    nodes.filter.Q.setTargetAtTime(layer.filter.q, t, 0.03);
  }
  // LFOs would be more complex to modulate live (omitted for brevity in this build, but structure present)
}

function startAll() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  Object.keys(layerNodes).forEach(id => {
    const l = State.current.layers.find(x => x.id === id);
    if (l && l.enabled) {
      const n = layerNodes[id];
      if (n && n.envGain) {
        n.envGain.gain.cancelScheduledValues(now);
        n.envGain.gain.setValueAtTime(0, now);
        n.envGain.gain.linearRampToValueAtTime(l.gain, now + (l.envelope.attack || 1.5));
      }
    }
  });
  isPlaying = true;
}

function stopAll(fade = 0.4) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  Object.values(layerNodes).forEach(n => {
    if (n.envGain) {
      n.envGain.gain.cancelScheduledValues(now);
      n.envGain.gain.setTargetAtTime(0, now, fade * 0.2);
    }
  });
  isPlaying = false;
}

// ==== MODULE: Sequencer (simplified but functional lookahead) ====
let seqTimer = null, currentStep = 0;
function startSequencer() {
  if (seqTimer) clearInterval(seqTimer);
  const stepTime = 60 / State.current.tempoBpm * 1000 / 4; // 16th notes
  seqTimer = setInterval(() => {
    if (!State.current.sequencer.enabled || !isPlaying) return;
    const seq = State.current.sequencer;
    const step = seq.pattern[currentStep % seq.steps];
    if (step && step.on) {
      const layer = State.current.layers.find(l => l.id === seq.activeLayerId);
      if (layer) {
        // Trigger voice for step
        triggerStepVoice(layer, step);
      }
    }
    currentStep = (currentStep + 1) % (seq.steps || 16);
    // Update UI playhead if visible
    updateSeqPlayhead();
  }, Math.max(40, stepTime * 0.6));
}

function triggerStepVoice(layer, step) {
  // For brevity in this build: lightly modulate the layer gain temporarily
  const nodes = layerNodes[layer.id];
  if (!nodes || !nodes.gain) return;
  const orig = layer.gain;
  nodes.gain.gain.setTargetAtTime(orig * (step.velocity || 0.9), audioCtx.currentTime, 0.005);
  setTimeout(() => {
    if (nodes.gain && isPlaying) nodes.gain.gain.setTargetAtTime(orig, audioCtx.currentTime + 0.08, 0.03);
  }, (step.gateLength || 0.4) * 220);
}

}

// ==== MODULE: Visualizer ====
let vizCanvas, vizCtx, vizMode = 'cymatics', vizPalette = 'aurora';
let particles = [];

function initVisualizer() {
  vizCanvas = document.getElementById('viz');
  vizCtx = vizCanvas.getContext('2d', { alpha: true });
  window.addEventListener('resize', resizeViz);
  resizeViz();
  requestAnimationFrame(drawViz);
}

function resizeViz() {
  const box = vizCanvas.parentElement;
  vizCanvas.width = box.clientWidth * (window.devicePixelRatio || 1);
  vizCanvas.height = box.clientHeight * (window.devicePixelRatio || 1);
  vizCtx.setTransform(window.devicePixelRatio || 1, 0, 0, window.devicePixelRatio || 1, 0, 0);
}

function drawViz() {
  if (!vizCtx || !vizCanvas) return;
  const w = vizCanvas.width / (window.devicePixelRatio || 1);
  const h = vizCanvas.height / (window.devicePixelRatio || 1);
  const cx = w / 2, cy = h / 2, R = Math.min(w, h) * 0.42;

  vizCtx.fillStyle = 'rgba(5,7,15,0.72)';
  vizCtx.fillRect(0, 0, w, h);

  const freqData = new Uint8Array(analyser ? analyser.frequencyBinCount : 0);
  if (analyser) analyser.getByteFrequencyData(freqData);

  const mode = State.current.visual.mode || vizMode;
  const intensity = State.current.visual.intensity || 0.7;
  const motion = State.current.visual.motion || 0.6;
  const t = performance.now() / 1000;

  if (mode === 'cymatics') drawCymatics(vizCtx, w, h, cx, cy, R, freqData, t, intensity, motion);
  else if (mode === 'spectrum') drawSpectrum(vizCtx, w, h, freqData);
  else if (mode === 'oscilloscope') drawScope(vizCtx, w, h);
  else if (mode === 'constellation') drawConstellation(vizCtx, w, h, freqData, t, motion);
  else if (mode === 'mandala') drawMandala(vizCtx, w, h, cx, cy, R, t, intensity, motion);
  else if (mode === 'waterfall') drawWaterfall(vizCtx, w, h, freqData);

  requestAnimationFrame(drawViz);
}

function drawCymatics(ctx, w, h, cx, cy, R, freqData, t, intensity, motion) {
  ctx.strokeStyle = '#6ee7f9';
  ctx.lineWidth = 1.2;
  const bands = 6;
  for (let k = 1; k <= bands; k++) {
    const rad = R * (0.2 + (k / bands) * 0.75);
    const phase = t * (0.3 + k * 0.07) * motion * 1.3;
    ctx.beginPath();
    for (let a = 0; a < 6.28; a += 0.08) {
      const r = rad + Math.sin(a * (k + 1) + phase) * (R * 0.035 * (1 + (freqData[k*20]||0)/180));
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r * 0.96;
      if (a === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.globalAlpha = 0.4 + intensity * 0.5;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawSpectrum(ctx, w, h, freqData) {
  const barW = w / (freqData.length * 0.7);
  ctx.fillStyle = '#3fd6c4';
  for (let i = 0; i < freqData.length * 0.7; i++) {
    const v = freqData[i] / 255;
    const bh = v * (h * 0.92);
    ctx.fillRect(i * barW, h - bh, barW - 0.5, bh);
  }
}

function drawScope(ctx, w, h) {
  const data = new Uint8Array(128);
  if (analyser) analyser.getByteTimeDomainData(data);
  ctx.strokeStyle = '#b06cf0';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < data.length; i++) {
    const x = (i / (data.length - 1)) * w;
    const y = (data[i] / 255) * h * 0.8 + h * 0.1;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
}

function drawConstellation(ctx, w, h, freqData, t, motion) {
  if (particles.length < 60) {
    particles = Array.from({length: 70}, () => ({x:Math.random()*w, y:Math.random()*h, vx:0, vy:0}));
  }
  ctx.fillStyle = 'rgba(110,231,249,0.6)';
  for (let p of particles) {
    const force = ((freqData[Math.floor(p.x/3)%freqData.length] || 80) - 80) * 0.0015 * motion;
    p.vx += force * (Math.random()-0.5);
    p.vy += force * (Math.random()-0.5) * 0.6;
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.96; p.vy *= 0.96;
    if (p.x < 0 || p.x > w) p.vx *= -0.8;
    if (p.y < 0 || p.y > h) p.vy *= -0.8;
    ctx.fillRect(p.x, p.y, 2.2, 2.2);
  }
}

function drawMandala(ctx, w, h, cx, cy, R, t, intensity, motion) {
  ctx.strokeStyle = '#f5b942';
  ctx.lineWidth = 1;
  for (let k = 3; k < 14; k += 2) {
    ctx.beginPath();
    const rot = t * 0.3 * motion * (k % 3 ? 1 : -1);
    for (let a = 0; a < 6.3; a += 0.1) {
      const r = R * 0.3 * (1 + Math.sin(k * a + rot) * intensity * 0.6);
      const x = cx + Math.cos(a + rot) * r;
      const y = cy + Math.sin(a + rot * 0.8) * r;
      if (a < 0.2) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
  }
}

function drawWaterfall(ctx, w, h, freqData) {
  // Simplified waterfall
  ctx.drawImage(ctx.canvas, 0, -1);
  for (let i = 0; i < freqData.length * 0.6; i += 2) {
    const v = freqData[i] / 255;
    ctx.fillStyle = `hsla(${200 + v * 80}, 70%, ${30 + v * 50}%, ${v * 0.8})`;
    ctx.fillRect(w - 3, (i / freqData.length) * h, 3, 2);
  }
}

function updateLayer(idx, prop, val) {
  State.current.layers[idx][prop] = val;
  const layer = State.current.layers[idx];
  if (audioCtx && layerNodes[layer.id]) buildLayerGraph(layer); // rebuild for major changes
  State.save();
  buildUI();
}

function soloLayer(idx) {
  const l = State.current.layers[idx];
  l.soloed = !l.soloed;
  State.current.layers.forEach((ly, i) => {
    if (i !== idx) ly.soloed = false;
  });
  applySoloMute();
  buildUI();
}

function deleteLayer(idx) {
  const id = State.current.layers[idx].id;
  if (layerNodes[id]) {
    Object.values(layerNodes[id]).forEach(n => { try { n.disconnect && n.disconnect(); } catch(e){} });
  }
  State.current.layers.splice(idx, 1);
  State.save();
  buildUI();
}

function lockSolfeggio(f) {
  if (State.current.layers.length === 0) return;
  const l = State.current.layers[0];
  l.solfeggioLock = l.solfeggioLock === f ? null : f;
  buildLayerGraph(l);
  Util.toast(`Solfeggio ${f} Hz ${l.solfeggioLock ? 'locked' : 'unlocked'}`);
  buildUI();
}

function setBinaural(beat) {
  const l = State.current.layers[0];
  l.binauralBeatHz = beat;
  l.binauralEnabled = true;
  buildLayerGraph(l);
  Util.toast(`Binaural ${beat} Hz (headphones)`);
}

function applyFX() {
  if (!audioCtx) return;
  if (reverbWet) reverbWet.gain.setTargetAtTime(State.current.reverb.mix, audioCtx.currentTime, 0.05);
  if (delayWet) delayWet.gain.setTargetAtTime(State.current.delay.mix, audioCtx.currentTime, 0.05);
}

function applySoloMute() {
  const anySolo = State.current.layers.some(l => l.soloed);
  State.current.layers.forEach(l => {
    const n = layerNodes[l.id];
    if (!n || !n.gain) return;
    const shouldPlay = l.enabled && !l.muted && (!anySolo || l.soloed);
    n.gain.gain.setTargetAtTime(shouldPlay ? l.gain : 0.0001, audioCtx.currentTime, 0.04);
  });
}

function wireMainControls() {
  const play = document.getElementById('btn-play');
  const stop = document.getElementById('btn-stop');
  play.onclick = () => { if (!audioCtx) initAudio().then(startAll); else startAll(); };

}

function toggleSequencer() {
  State.current.sequencer.enabled = !State.current.sequencer.enabled;

    startSequencer();

    clearInterval(seqTimer); seqTimer = null;
  }
  document.getElementById('seq-status').textContent = State.current.sequencer.enabled ? 'RUNNING' : '';
}

let timerId = null;
function toggleTimer() {
  const t = State.current.timer;
  t.enabled = !t.enabled;
  if (t.enabled) {
    t.remainingSec = t.durationMin * 60;
    t.state = 'running';
    timerId = setInterval(() => {
      t.remainingSec -= 1;
      if (t.remainingSec <= 0) {
        stopAll(1.5);
        clearInterval(timerId);
        Util.toast('Session complete. Breathe.');
      }
      document.getElementById('timer-panel').innerHTML = `<div>${Util.formatTime(t.remainingSec)}</div>`;
    }, 1000);
  } else {
    clearInterval(timerId);
  }
}

async function boot() {
  let saved = State.load();
  if (!saved) saved = State.defaults();
  // Ensure one layer
  if (!saved.layers || saved.layers.length === 0) {
    saved.layers = [createDefaultLayer()];
  }
  State.current = saved;

  // Build UI
  buildUI();
  initVisualizer();

  // First run overlay
  const overlay = document.getElementById('first-run');
  document.getElementById('btn-enter').onclick = async () => {
    overlay.style.display = 'none';
    await initAudio();
    Util.toast('Chamber open. Sound engaged.');
    // Auto-restore visual mode etc
  };

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === ' ') { e.preventDefault(); if (isPlaying) stopAll(); else startAll(); }
    if (e.key.toLowerCase() === 'p') document.getElementById('btn-panic').click();
    if (e.key.toLowerCase() === 'f') document.getElementById('btn-fullscreen').click();
  });

  // Autosave
  setInterval(() => State.save(), 1200);

  // Load one factory demo on first use
  if (!localStorage.getItem('resonarium.v2')) {
    loadFactoryPreset('Schumann Cradle');
  }

  Util.toast('Resonarium ready. Tap Enter the chamber.');
}
